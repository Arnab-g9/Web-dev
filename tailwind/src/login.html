<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body class="bg-gray-900 flex justify-center items-center min-h-screen">
    <div class="bg-gray-700 rounded-lg p-8 shadow-2xl max-w-sm w-full shadow-slate-50">
      <h2 class="text-center text-3xl text-white mb-6 font-bold">Login</h2>
      <form>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-300 mb-2" for="email">Email</label>
          <input class="w-full px-3 py-2 bg-gray-600 border-gray-900 rounded-md text-white focus: outline-none focus:ring-2 focus:ring-blue-500" type="email" id="email" name="email" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2" for="password">Password</label>
          <input class="w-full px-3 py-2 bg-gray-600 border-gray-900 rounded-md text-white focus: outline-none focus:ring-2 focus:ring-blue-500" type="password" id="password" name="password" />
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md mt-6 shadow-2xl ">
          Login
        </button>
      </form>
    </div>
  </body>
</html>
